
name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Change Log
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Current version: $VERSION"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > RELEASE_CHANGELOG.md

          if [ ! -s RELEASE_CHANGELOG.md ]; then
            echo "❌ No changelog found for version $VERSION"
            exit 1
          fi

          echo "Changelog extracted:"
          cat RELEASE_CHANGELOG.md

      - name: Collect release jars
        id: release_jars
        run: |
          mapfile -t jars < <(find fabric/build/libs neoforge/build/libs -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' | sort)

          if [ ${#jars[@]} -eq 0 ]; then
            echo "❌ No release jars found"
            exit 1
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "${jars[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.release_jars.outputs.files }}
          body_path: RELEASE_CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}